<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Application Received | PeakLifeRx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: linear-gradient(180deg, #08111f 0%, #091425 100%);
      color: #ecf3ff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px 24px;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 52px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 70px rgba(0,0,0,0.4);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #2f73ff, #6dc9ff);
      border-radius: 22px;
      display: grid;
      place-items: center;
      margin: 0 auto 28px;
      font-size: 2rem;
    }
    h1 { font-size: 2rem; margin: 0 0 14px; letter-spacing: -0.03em; }
    p  { color: #a9b8d0; line-height: 1.7; margin: 0 0 32px; }
    a  {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      background: linear-gradient(135deg, #2f73ff, #6dc9ff);
      color: #06111f;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 150ms, box-shadow 150ms;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(58,127,255,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Application Received</h1>
    <p>Thanks for reaching out to PeakLifeRx. Our team will review your information
       and follow up within one business day.</p>
    <a href="/">← Return to Home</a>
  </div>
</body>
</html>
